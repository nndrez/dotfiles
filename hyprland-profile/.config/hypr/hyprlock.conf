# hyprlock — path: ~/.config/hypr/hyprlock.conf

general {
    hide_cursor = true
    grace = 0
    immediate_render = true
    fractional_scaling = 0
}

auth {
    pam:enabled = true
}

animations {
    enabled = true
    bezier = easeOut, 0.25, 0.1, 0.25, 1
    animation = fadeIn, 1, 2, easeOut
    animation = fadeOut, 1, 2, easeOut
}

background {
    monitor =
    path = screenshot
    blur_passes = 2
    blur_size = 6
    noise = 0.0117
    color = rgba(18, 18, 18, 1.0)
}

input-field {
    monitor =
    size = 300, 55
    outline_thickness = 2
    rounding = 6
    outer_color = rgba(f0f0f0ee)
    inner_color = rgba(18, 18, 18, 1.0)
    font_color = rgba(f0f0f0ee)
    font_family = JetBrains Mono
    placeholder_text = Password...
    fail_text = Wrong password
    fail_color = rgba(e67e80ee)
    fade_on_empty = false
    dots_size = 0.2
    position = 0, 120
    halign = center
    valign = center
}

label {
    monitor =
    text = $TIME
    color = rgba(f0f0f0ee)
    font_size = 64
    font_family = JetBrains Mono
    position = 0, -40
    halign = center
    valign = center
}
