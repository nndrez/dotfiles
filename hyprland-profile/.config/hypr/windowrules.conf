# =========================================================================
# WINDOW RULES 
# =========================================================================

windowrule {
    name = suppress-maximize-events
    match:class = .*
    suppress_event = maximize
}

windowrule {
    name = fix-xwayland-drags
    
    match:class = ^$           
    match:title = ^$           
    match:xwayland = true     
    match:float = true        
    match:fullscreen = false  
    match:pin = false         
    
    no_focus = true
}

windowrule {
    name = move-hyprland-run
    
    match:class = hyprland-run
    move = 20 100%-120
    float = yes
}

windowrule {
    name = swappy-editor
    
    match:class = ^swappy$
    
    float = true
    center = true
    size = 80% 80%
}
