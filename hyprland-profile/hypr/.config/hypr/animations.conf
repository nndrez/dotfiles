# =========================================================================
# ANIMATIONS
# =========================================================================

animations {
    enabled = yes

    bezier = sharpIn, 0.4, 0, 0.2, 1
    bezier = easeOutExpo, 0.16, 1, 0.3, 1

    animation = windows, 1, 3, easeOutExpo, slide
    animation = windowsIn, 1, 3, easeOutExpo, slide
    animation = windowsOut, 1, 2, sharpIn, slide
    animation = border, 1, 1, linear
    animation = fade, 1, 2, easeOutExpo
    animation = workspaces, 1, 4, easeOutExpo, slidefade 20%
}
